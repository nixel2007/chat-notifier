# Конфигурация деплоя в Railway.
# Образ собирается и публикуется в Docker Hub через
# .github/workflows/publish-image.yml; сервис Railway разворачивается из готового
# образа docker.io/<username>/chat-notifier, поэтому секции [build] тут нет -
# деплой не собирает образ и не упирается в таймауты сети при opm install.
# Railway сам передаёт переменную окружения PORT - приложение слушает её.

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
